name: Daily Attendance Reminder

on:
  schedule:
    # Runs at 10:00 AM IST (04:30 UTC) every Monday through Friday.
    # - cron: '30 4 * * 1-5'
    # Runs at 12:45 PM IST (07:15 UTC) every Monday through Friday.
    - cron: '15 7 * * 1-5'
  
  # Allows you to trigger it manually from the Actions tab
  workflow_dispatch: 

jobs:
  ping_reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cron Endpoint
        # Added --max-time 120 and --retry 3 to wait for free servers to wake up
        run: curl --max-time 120 --retry 3 -sS https://attendbot-demo.onrender.com/cron/reminder